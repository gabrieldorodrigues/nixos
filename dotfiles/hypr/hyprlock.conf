# Hyprlock - screen locker (https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/)
background {
    monitor =
    color = rgba(1e1e2eff)
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    outer_color = rgba(89b4faff)
    inner_color = rgba(313244ff)
    font_color = rgba(cdd6f4ff)
    placeholder_text = <i>Password...</i>
    fade_on_empty = false
    position = 0, -40
    halign = center
    valign = center
}

# Clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(cdd6f4ff)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(a6adc8ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}
